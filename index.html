<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikir Değerlendirme Merkezi v4 - Kalıcı Mod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .idea-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .idea-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .active-tab {
            background-color: #2563eb !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .loading-spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .winner-border {
            border: 3px solid #2563eb;
            position: relative;
        }

        .winner-border::before {
            content: 'GÜNÜN SEÇİMİ';
            position: absolute;
            top: -12px;
            left: 20px;
            background: #2563eb;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">ANALİZ<span class="text-blue-600">HUB</span></h1>
            </div>
            <div id="connectionStatus" class="flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
                <div id="statusDot" class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                <span id="statusText" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Bağlanıyor...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-10">
        
        <!-- Input Form -->
        <section class="mb-10 bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Yeni Bir Fikir Öner</h2>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
                <div class="lg:col-span-3">
                    <input type="text" id="ideaTitle" placeholder="Fikir Başlığı" class="w-full h-12 px-5 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 text-sm font-semibold">
                </div>
                <div class="lg:col-span-2">
                    <select id="ideaCategory" class="w-full h-12 px-4 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 text-sm font-bold text-slate-600">
                        <option value="Teknoloji">Teknoloji</option>
                        <option value="Sosyal">Sosyal</option>
                        <option value="Çevre">Çevre</option>
                        <option value="Eğitim">Eğitim</option>
                    </select>
                </div>
                <div class="lg:col-span-5">
                    <input type="text" id="ideaDesc" placeholder="Kısaca açıklayın (En az 10 karakter)..." class="w-full h-12 px-5 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div class="lg:col-span-2">
                    <button onclick="submitIdea()" id="submitBtn" disabled class="w-full h-12 bg-slate-300 text-white rounded-2xl font-bold text-sm flex items-center justify-center transition-all cursor-not-allowed">
                        Bağlantı Bekleniyor...
                    </button>
                </div>
            </div>
            <p id="errorMsg" class="text-rose-500 text-[11px] font-bold mt-3 hidden">⚠️ Lütfen tüm alanları geçerli şekilde doldurun.</p>
        </section>

        <!-- Filters & Action -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
            <div class="flex gap-2 overflow-x-auto pb-2 w-full no-scrollbar">
                <button onclick="setFilter('Hepsi')" id="tab-Hepsi" class="filter-tab active-tab px-6 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold transition-all">Hepsi</button>
                <button onclick="setFilter('Teknoloji')" id="tab-Teknoloji" class="filter-tab px-6 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold transition-all">Teknoloji</button>
                <button onclick="setFilter('Sosyal')" id="tab-Sosyal" class="filter-tab px-6 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold transition-all">Sosyal</button>
                <button onclick="setFilter('Çevre')" id="tab-Çevre" class="filter-tab px-6 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold transition-all">Çevre</button>
                <button onclick="setFilter('Eğitim')" id="tab-Eğitim" class="filter-tab px-6 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold transition-all">Eğitim</button>
            </div>
            <button onclick="startAnalysis()" class="whitespace-nowrap px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:bg-black shadow-xl shadow-slate-200 transition-all active:scale-95">
                Uzman Analizini Başlat
            </button>
        </div>

        <!-- Grid -->
        <div id="ideaGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-24 flex flex-col items-center justify-center">
                <div class="loading-spinner mb-4"></div>
                <p class="text-slate-400 font-bold text-sm animate-pulse tracking-widest uppercase">Veritabanına Erişiliyor</p>
            </div>
        </div>

        <!-- Analysis View -->
        <div id="analysisPanel" class="hidden mt-12 p-10 bg-slate-900 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600/20 blur-[100px] -mr-48 -mt-48"></div>
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-6">
                    <span class="px-3 py-1 bg-blue-600 text-[10px] font-black rounded-full tracking-tighter">UZMAN GÖRÜŞÜ</span>
                    <div class="h-[1px] flex-grow bg-slate-700"></div>
                </div>
                <h2 id="winnerTitle" class="text-4xl font-black mb-4">---</h2>
                <p id="winnerAnalysis" class="text-slate-400 leading-relaxed max-w-3xl mb-10 text-lg">---</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase mb-2">Beğeni Skoru</span>
                        <span id="statLikes" class="text-3xl font-black text-blue-400">0</span>
                    </div>
                    <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase mb-2">Teknik Uygunluk</span>
                        <span id="statViability" class="text-3xl font-black text-blue-400">%0</span>
                    </div>
                    <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase mb-2">Pazar Potansiyeli</span>
                        <span id="statMarket" class="text-3xl font-black text-blue-400">Yüksek</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'master-hub-v4-persistent';

        let ideas = [];
        let user = null;
        let currentFilter = 'Hepsi';
        let likedIdeas = JSON.parse(localStorage.getItem('user_likes_v4') || '[]');

        // Improved Auth Logic with Retry mechanism (Rule 3)
        async function initAuth() {
            const authButton = document.getElementById('submitBtn');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error, retrying...", err);
                // Fallback attempt
                setTimeout(initAuth, 2000);
            }
        }

        // Listener for auth state (Rule 3)
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                const btn = document.getElementById('submitBtn');
                btn.disabled = false;
                btn.innerText = "Gönder";
                btn.classList.remove('bg-slate-300', 'cursor-not-allowed');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                
                document.getElementById('statusDot').classList.replace('bg-amber-500', 'bg-green-500');
                document.getElementById('statusDot').classList.remove('animate-pulse');
                document.getElementById('statusText').innerText = "ÇEVRİMİÇİ";

                startListening();
            } else {
                document.getElementById('statusText').innerText = "BAĞLANTI BEKLENİYOR";
            }
        });

        // Realtime Data (Rule 1: Strict Paths)
        function startListening() {
            if (!user) return;
            // Public collection path check
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'ideas');
            
            onSnapshot(colRef, (snap) => {
                ideas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                ideas.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                render();
            }, (err) => {
                console.error("Firestore Listen Error:", err);
                // If permission error occurs, user might need to re-auth
                if(err.code === 'permission-denied') {
                    console.log("Permission denied, checking auth...");
                }
            });
        }

        function render() {
            const grid = document.getElementById('ideaGrid');
            const filtered = currentFilter === 'Hepsi' ? ideas : ideas.filter(i => i.category === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 font-bold">Bu kategori henüz boş. İlk fikri sen paylaş!</div>`;
                return;
            }

            grid.innerHTML = filtered.map(i => {
                const isLiked = likedIdeas.includes(i.id);
                return `
                    <div id="card-${i.id}" class="idea-card p-6 rounded-[2rem] border border-slate-200 flex flex-col justify-between min-h-[220px]">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[10px] font-black px-3 py-1 bg-slate-100 text-slate-500 rounded-full uppercase tracking-tighter">${i.category}</span>
                                <button onclick="window.handleLike('${i.id}')" class="flex items-center gap-1.5 transition-all ${isLiked ? 'text-rose-500' : 'text-slate-300 hover:text-rose-400'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="${isLiked ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                    </svg>
                                    <span class="text-sm font-black">${i.likes || 0}</span>
                                </button>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg mb-2 leading-tight">${i.title}</h3>
                            <p class="text-sm text-slate-500 line-clamp-3 leading-relaxed">${i.desc}</p>
                        </div>
                        <div class="mt-6 pt-4 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[9px] font-mono text-slate-300">USER: ${i.userId?.substring(0, 5)}</span>
                            <div class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-lg">SKOR: ${i.score || 0}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.submitIdea = async () => {
            if (!user) {
                console.log("No user, attempting re-auth...");
                await initAuth();
                return;
            }

            const t = document.getElementById('ideaTitle');
            const c = document.getElementById('ideaCategory');
            const d = document.getElementById('ideaDesc');
            const err = document.getElementById('errorMsg');

            if (t.value.trim().length < 2 || d.value.trim().length < 10) {
                err.classList.remove('hidden');
                return;
            }
            err.classList.add('hidden');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Kaydediliyor...";

            try {
                const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'ideas');
                await addDoc(colPath, {
                    title: t.value.trim(),
                    category: c.value,
                    desc: d.value.trim(),
                    likes: 0,
                    score: (Math.random() * 3 + 6).toFixed(1),
                    viability: Math.floor(Math.random() * 20 + 75),
                    timestamp: Date.now(),
                    userId: user.uid
                });
                t.value = ""; d.value = "";
            } catch (e) {
                console.error("Write Error:", e);
                alert("Bağlantı hatası: Veri gönderilemedi.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Gönder";
            }
        };

        window.handleLike = async (id) => {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ideas', id);
            
            try {
                if (likedIdeas.includes(id)) {
                    await updateDoc(docRef, { likes: increment(-1) });
                    likedIdeas = likedIdeas.filter(l => l !== id);
                } else {
                    await updateDoc(docRef, { likes: increment(1) });
                    likedIdeas.push(id);
                }
                localStorage.setItem('user_likes_v4', JSON.stringify(likedIdeas));
            } catch (e) {
                console.error("Like Error:", e);
            }
        };

        window.setFilter = (cat) => {
            currentFilter = cat;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(`tab-${cat}`).classList.add('active-tab');
            document.getElementById('analysisPanel').classList.add('hidden');
            render();
        };

        window.startAnalysis = () => {
            const pool = currentFilter === 'Hepsi' ? ideas : ideas.filter(i => i.category === currentFilter);
            if (pool.length === 0) return;

            const winner = [...pool].sort((a,b) => (b.likes || 0) - (a.likes || 0) || (b.score || 0) - (a.score || 0))[0];
            
            document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('winner-border'));
            const card = document.getElementById(`card-${winner.id}`);
            if (card) card.classList.add('winner-border');

            const panel = document.getElementById('analysisPanel');
            panel.classList.remove('hidden');
            document.getElementById('winnerTitle').innerText = winner.title;
            document.getElementById('winnerAnalysis').innerText = `Analiz tamamlandı: "${winner.title}" fikri, %${winner.viability} teknik uygunluk skoru ile kategorisinde öne çıkıyor.`;
            document.getElementById('statLikes').innerText = winner.likes || 0;
            document.getElementById('statViability').innerText = `%${winner.viability}`;
            
            panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        // Start Auth process
        initAuth();
    </script>
</body>
</html>
